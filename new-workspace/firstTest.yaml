appId: com.pozitron.hepsiburada
---

- launchApp:
    clearState: true

#Arama alanına "Adidas ayakkabı" yazılır ve arama yapılır
- setClipboard: "Adidas ayakkabı"
- tapOn: "Ürün, kategori veya marka ara"
- pasteText
- pressKey: Enter


#Filtreler alanına girilir ve seçimler yapılır
- tapOn:
    point: 1%,38%

- tapOn:
    point: 4%,40%

- assertVisible: Filtrele

# Cinsiyet: Erkek (Hepsiburada filtre menüsü genellikle yan panel veya liste şeklindedir)
- tapOn: "Cinsiyet"
- tapOn: "Erkek"
- tapOn: "Uygula" # Seçimi onaylamak için

- assertVisible: Filtrele

# Renk: Beyaz
- tapOn: "Renk"
- tapOn: "Beyaz"
- tapOn: "Uygula"

- assertVisible: Filtrele

# Numara: 42
- tapOn: "Beden"
- tapOn: "42"
- tapOn: "Uygula"

- assertVisible: Filtrele

#3.000 TL – 5.000 TL
- tapOn: "Fiyat Aralığı"
- tapOn: "En az"
- inputText: "3000"
- tapOn: "En çok" # İkinci input alanı için
- inputText: "5000"
- tapOn: "Uygula"

#Filtrelerin uygulandığını doğrula
- assertVisible: "Erkek"
- assertVisible: "Beyaz"
- tapOn:
    id: btnApply

#Listelenen ürünlerden herhangi biri seçilir (İlk sıradaki ürün)
- tapOn:
    index: 0
    id: "productBoxImage" # Ürün görseline tıkla

#Ürün detay sayfasında "Sepete Ekle" butonuna tıklanır
- tapOn: "Sepete Ekle"

#Kullanıcı login olmadan sepete yönlendirilir
- tapOn: "Sepete git"

# 11. Sepet sayfasında doğrulamalar
- assertVisible: "Sepetim"
